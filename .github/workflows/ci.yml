# CI pipeline: runs on every push & pull request.
# Goal: catch broken builds / lint / type errors before they merge.
# No Docker needed — GitHub gives us a free Linux VM with Node preinstalled.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Stop the older run if you push again to the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      # 1. Download your repo code into the VM.
      - uses: actions/checkout@v4

      # 2. Install the exact Node version your project expects.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm # auto-caches node_modules for fast repeat builds

      # 3. Install dependencies.
      # We use `npm install`, NOT `npm ci`, because this project has
      # platform-specific native deps (Tailwind v4's oxide engine pulls
      # @emnapi/* natively). The lockfile committed from Windows only records
      # Windows native variants, so a Linux CI runner needs npm to reconcile
      # and fetch the Linux variants itself. `npm ci` is strict and would abort
      # because the lockfile differs per platform. `npm install` handles this
      # while still respecting the versions pinned in package.json.
      - run: npm install

      # 4. Lint, type-check, and build. Any of these failing = red build.
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build
